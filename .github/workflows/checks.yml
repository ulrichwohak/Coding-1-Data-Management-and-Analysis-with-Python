name: checks

on:
  push:
  pull_request:

jobs:
  course:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true
      - run: uv lock --check
      - run: uv sync --locked
      - run: uv run python scripts/fetch_data.py
      - run: uv run python scripts/check_no_pip.py
      - run: uv run python scripts/check_notebooks.py
